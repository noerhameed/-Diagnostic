<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>People Diagnostic Tool</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Georgia', serif; background: #0a0a0a; color: #ffffff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { max-width: 720px; width: 100%; }
    .screen { display: none; }
    .screen.active { display: block; }
    .welcome-label { font-family: 'Arial', sans-serif; font-size: 11px; letter-spacing: 3px; color: #2E8B8B; text-transform: uppercase; margin-bottom: 24px; }
    .welcome-title { font-size: clamp(22px, 4vw, 32px); font-weight: normal; line-height: 1.3; color: #ffffff; margin-bottom: 32px; letter-spacing: 1px; }
    .welcome-body { font-family: 'Arial', sans-serif; font-size: 15px; line-height: 1.9; color: #aaaaaa; margin-bottom: 48px; }
    .welcome-body p { margin-bottom: 16px; }
    .btn-start { font-family: 'Arial', sans-serif; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; background: transparent; color: #2E8B8B; border: 1px solid #2E8B8B; padding: 16px 40px; cursor: pointer; transition: all 0.3s ease; margin-bottom: 40px; display: block; }
    .btn-start:hover { background: #2E8B8B; color: #0a0a0a; }
    .welcome-sign { font-family: 'Arial', sans-serif; font-size: 12px; color: #444444; line-height: 1.8; }
    .welcome-sign strong { color: #666666; }
    .progress-bar { width: 100%; height: 1px; background: #1a1a1a; margin-bottom: 60px; }
    .progress-fill { height: 100%; background: #2E8B8B; transition: width 0.5s ease; }
    .question-count { font-family: 'Arial', sans-serif; font-size: 11px; letter-spacing: 3px; color: #333333; text-transform: uppercase; margin-bottom: 40px; }
    .question-text { font-size: clamp(18px, 3vw, 24px); font-weight: normal; line-height: 1.5; color: #ffffff; margin-bottom: 48px; }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option { font-family: 'Arial', sans-serif; font-size: 14px; line-height: 1.6; color: #777777; background: transparent; border: 1px solid #181818; padding: 16px 22px; cursor: pointer; text-align: left; transition: all 0.2s ease; display: flex; align-items: flex-start; gap: 16px; }
    .option:hover { border-color: #2E8B8B; color: #ffffff; background: #0a1a1a; }
    .option.selected { border-color: #2E8B8B; color: #ffffff; background: #0a1a1a; }
    .option-letter { font-family: 'Arial', sans-serif; font-size: 10px; letter-spacing: 1px; color: #2E8B8B; min-width: 14px; margin-top: 3px; text-transform: uppercase; }
    .result-label { font-family: 'Arial', sans-serif; font-size: 10px; letter-spacing: 3px; color: #2E8B8B; text-transform: uppercase; margin-bottom: 12px; }
    .result-state { font-size: clamp(28px, 5vw, 44px); font-weight: normal; line-height: 1.2; color: #ffffff; margin-bottom: 36px; }
